  <div class="speaker-bottom-sheet" id="speakerBottomSheet">
    <div class="speaker-bottom-sheet-handle"></div>
    <div class="speaker-bottom-sheet-content">
      <div class="speaker-bottom-sheet-name" id="sheetName"></div>
      <div class="speaker-bottom-sheet-affiliation" id="sheetAffiliation"></div>
      <div class="speaker-bottom-sheet-talk" id="sheetTalk"></div>
    </div>
  </div>
  <div class="speaker-bottom-sheet-overlay" id="speakerSheetOverlay"></div>

  <button class="scroll-to-top" id="scrollToTop" aria-label="Scroll to top">
    <i class="material-icons">keyboard_arrow_up</i>
  </button>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script src="assets/js/materialize.min.js"></script>
  <script type="text/javascript">
    $(document).ready(function(){
      $('.sidenav').sidenav();
      var $tabs = $('.tabs');
      $tabs.tabs();

      // Deadline-based visibility
      (function() {
        var now = new Date();
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        document.querySelectorAll('[data-show-until]').forEach(function(el) {
          var deadline = new Date(el.getAttribute('data-show-until') + 'T23:59:59');
          if (today > deadline) {
            if (el.tagName === 'LI' && el.classList.contains('tab')) {
              el.classList.add('tab-expired');
              var anchor = el.querySelector('a');
              if (anchor) anchor.removeAttribute('href');
            }
            if (el.classList.contains('program-container')) {
              el.style.display = 'none';
            }
          }
        });

        document.querySelectorAll('[data-hide-after]').forEach(function(el) {
          var deadline = new Date(el.getAttribute('data-hide-after') + 'T23:59:59');
          if (today > deadline) {
            el.style.display = 'none';
          }
        });
      })();

      // Activate tab from URL hash (e.g. #tab_competition)
      function selectTabFromHash() {
        var hash = window.location.hash;
        if (hash && $(hash).length) {
          $tabs.tabs('select', hash.substring(1));
        }
      }
      selectTabFromHash();
      $(window).on('hashchange', selectTabFromHash);
      $('.competition-tab-link').on('click', function(e) {
        e.preventDefault();
        $tabs.tabs('select', 'tab_competition');
        var tabContainer = document.querySelector('.program-tab-container');
        if (tabContainer) {
          tabContainer.scrollIntoView({ behavior: 'smooth' });
        }
      });
      $(".dropdown-trigger").dropdown({ hover: true, constrainWidth: false });

      var $scrollBtn = $('#scrollToTop');
      var $nav = $('nav');
      $(window).on('scroll', function(){
        var scrollTop = $(this).scrollTop();
        if (scrollTop > 300) {
          $scrollBtn.addClass('visible');
        } else {
          $scrollBtn.removeClass('visible');
        }
        if (scrollTop > 10) {
          $nav.addClass('nav-scrolled');
        } else {
          $nav.removeClass('nav-scrolled');
        }
      });
      $scrollBtn.on('click', function(){
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // Speaker cards scroll-hint fade
      document.querySelectorAll('.speaker-cards-wrap').forEach(function(wrap) {
        var strip = wrap.querySelector('.speaker-cards');
        if (strip) {
          strip.addEventListener('scroll', function() {
            var atEnd = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 5;
            wrap.classList.toggle('scrolled-end', atEnd);
          });
        }
      });

      // Speaker bottom sheet (mobile)
      if (window.innerWidth < 993) {
        var $sheet = $('#speakerBottomSheet');
        var $overlay = $('#speakerSheetOverlay');
        function closeSheet() {
          $sheet.removeClass('active');
          $overlay.removeClass('active');
        }
        $(document).on('click', '.speaker-card[data-talk-title]', function() {
          if (window.innerWidth >= 993) return;
          var $card = $(this);
          $('#sheetName').text($card.find('.speaker-card-name').text().trim());
          $('#sheetAffiliation').text($card.find('.speaker-card-affiliation').text().trim());
          $('#sheetTalk').text($card.attr('data-talk-title'));
          $sheet.addClass('active');
          $overlay.addClass('active');
        });
        $overlay.on('click', closeSheet);
        $sheet.on('click', function(e) {
          if ($(e.target).hasClass('speaker-bottom-sheet-handle')) closeSheet();
        });
      }

      // Committee bio toggle
      window.toggleBio = function(btn) {
        var bio = btn.previousElementSibling;
        bio.classList.toggle('expanded');
        btn.textContent = bio.classList.contains('expanded') ? 'Read less' : 'Read more';
      };

      // Fade-in on scroll
      var fadeEls = document.querySelectorAll('.fade-in');
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        fadeEls.forEach(function(el) { observer.observe(el); });
      } else {
        fadeEls.forEach(function(el) { el.classList.add('visible'); });
      }
    });
  </script>
</body>
</html>
